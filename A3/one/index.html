<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid games</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    <main>
        <nav>
            <div class="logo-nav">
                <img src="/task/cohort_task_garv/A3/images/squid games/s-logo.png" alt="logo">
            </div>
            <div class="nav-center">
                <div id="underline"></div>
                <div class="one">About</div>
                <div class="one">Watch Now</div>
                <div class="one">Actors</div>
                <div class="one">Contact</div>
            </div>
            <div class="nav-right">
                <i class="ri-menu-3-fill"></i>
            </div>
        </nav>
        <div class="hero">
            <div class="hero-left">
                <div id="str1" class="str"></div>
                <img id="h-img" src="/task/cohort_task_garv/A3/images/squid games/s-logo.png" alt="squidgames">
                <div id="str2" class="str"></div>

                <span><p>Action/Thriller/Drama Series directed by Dong-hyuk Hwang<br> Seasons1: 9Episodes</p></span>
                <div class="play"><div class="circle"><i class="ri-play-large-fill"></i></div><p>Play Now</p></div>
                <div class="watch_now"><i class="ri-play-large-line"></i>Watch Trailer</div>
                <h1>GAME</h1>
            </div>
            <div class="hero-right">
                <hr id="vertical-line">
                <span><p>SCROLL</p></span>
                <div class="hero-img">
                    <img src="/task/cohort_task_garv/A3/images/squid games/main.png" alt="hero image">
                </div>
                <div class="social">
                    <div class="twitter"><i class="ri-twitter-line"></i></div>
                    <div class="insta"><i class="ri-instagram-line"></i></div>
                    <div class="facebook"><i class="ri-facebook-fill"></i></div>
                </div>
                <span id="squid"><p>SQUID</p></span>
            </div>
        </div>
        <div class="bottom">
            <div class="b1"><img src="/task/cohort_task_garv/A3/images/squid games/s1.png" alt="image1"></div>
            <div class="b1"><img src="/task/cohort_task_garv/A3/images/squid games/s2.png" alt="image1"></div>
            <div class="b1"><img src="/task/cohort_task_garv/A3/images/squid games/s3.png" alt="image1"></div>
        </div>
    </main>
</body>
</html>
