<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">

        <!-- Left yellow panel -->
        <div class="panel-left">
            <!-- Pokéball watermark -->
            <div class="pokeball">
                <img src="pokeball.png" alt="Pokéball">
            </div>
        </div>

        <!-- Right cream panel -->
        <div class="panel-right"></div>

        <!-- Pokémon Logo -->
        <div class="logo">
            <img src="pokemon-logo.png" alt="Logo">
        </div>

        <!-- Hamburger menu -->
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Pikachu character -->
        <div class="pikachu">
            <img src="pikachu_cutout.png" alt="Pikachu">
        </div>

        <!-- Main text content -->
        <div class="content">
            <p class="gen-label">POKEMON GEN I</p>
            <h1 class="pokemon-name">Pikachu</h1>
            <p class="description">
                Pikachu is an Electric-type Pokémon introduced
                in Generation I. Pikachu are small, chubby,
                and incredibly cute mouse-like Pokémon.
                They are almost completely covered by
                yellow fur.
            </p>
            <div class="counter">
                <span class="counter-line"></span>
                <span class="counter-text">01 / 08</span>
            </div>
        </div>

        <!-- Navigation dots -->
        <div class="nav-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

    </div>
</body>
</html>
